name: CI Pipeline

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Scream Ted
        run: echo "Teddy👉👈"

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Build Docker Image
        run: docker build -t task-api .

      #Only push when it's not a PR (i.e push to dev)
      - name: Login to Docker Hub
        if: github.event_name == 'push'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      
      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker tag task-api ${{ secrets.DOCKER_USERNAME }}/task-api:dev
          docker push ${{ secrets.DOCKER_USERNAME }}/task-api:dev